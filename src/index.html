<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>2048 clone</title>
    <link rel="stylesheet" href="main.css">
    <script type="module" src="app.js"></script>
  </head>
  <body>
    <main class="game">
      <header class="scores">
        <div class="score">
          <span class="score-label">Score</span>
          <span class="score-value" id="current-score">0</span>
        </div>
        <div class="score">
          <span class="score-label">Best</span>
          <span class="score-value" id="best-score">0</span>
        </div>
      </header>
      <div class="board">
        <div class="grid grid-background" aria-hidden="true">
          <div class="cell"></div>
          <div class="cell"></div>
          <div class="cell"></div>
          <div class="cell"></div>
          <div class="cell"></div>
          <div class="cell"></div>
          <div class="cell"></div>
          <div class="cell"></div>
          <div class="cell"></div>
          <div class="cell"></div>
          <div class="cell"></div>
          <div class="cell"></div>
          <div class="cell"></div>
          <div class="cell"></div>
          <div class="cell"></div>
          <div class="cell"></div>
        </div>
        <div class="grid" id="grid">
          <div class="cell"></div>
          <div class="cell"></div>
          <div class="cell"></div>
          <div class="cell"></div>
          <div class="cell"></div>
          <div class="cell"></div>
          <div class="cell"></div>
          <div class="cell"></div>
          <div class="cell"></div>
          <div class="cell"></div>
          <div class="cell"></div>
          <div class="cell"></div>
          <div class="cell"></div>
          <div class="cell"></div>
          <div class="cell"></div>
          <div class="cell"></div>
        </div>
        <div class="game-over" hidden>
          <h2 class="game-over-heading">Game over</h2>
          <button class="play-again" type="button">Play again</button>
        </div>
      </div>
    </main>
  </body>
</html>
